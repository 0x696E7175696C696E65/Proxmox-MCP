name: hardening

on:
  workflow_dispatch:
    inputs:
      run_lab:
        description: Run lab-only SSH, chaos, and performance gates
        required: false
        default: "false"
  schedule:
    - cron: "17 3 * * *"

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: enterprise-proxmox-mcp:ci

  vulnerability-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install audit tooling
        run: python -m pip install --upgrade pip pip-audit
      - name: Audit dependencies
        run: python -m pip_audit --project .

  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json

  lab-gates:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || inputs.run_lab == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install package
        run: python -m pip install --upgrade pip '.[dev]'
      - name: Read-only Proxmox lab smoke tests
        run: python -m pytest tests/lab -m lab
      - name: SSH sandbox tests
        run: python -m pytest tests/ssh
      - name: Contract and mutation safety tests
        run: python -m pytest tests/tools/test_tool_coverage_contract.py tests/proxmox
      - name: Chaos gate placeholder
        run: |
          echo "Run controlled Proxmox lab chaos scenarios when lab credentials are configured."
          test -n "${PROXMOX_MCP_LAB_ENABLED:-}" || exit 0
      - name: Performance gate placeholder
        run: |
          echo "Run load tests for tool latency, audit throughput, and SSH concurrency when lab is enabled."
          test -n "${PROXMOX_MCP_LAB_ENABLED:-}" || exit 0
