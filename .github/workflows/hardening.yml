name: hardening

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      run_lab:
        description: Run lab-only SSH, chaos, and performance gates
        required: false
        default: "false"
      run_compose_smoke:
        description: Run homelab Docker Compose smoke test
        required: false
        default: "false"
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  migration-validation:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: proxmox_mcp_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: proxmox_mcp
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U proxmox_mcp -d proxmox_mcp_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install package
        run: python -m pip install --upgrade pip '.[dev]'
      - name: Validate Alembic upgrade and model parity
        run: python -m pytest tests/release/test_migration_gate.py -q
      - name: Validate PostgreSQL Alembic upgrade and model parity
        env:
          PROXMOX_MCP_TEST_POSTGRES_URL: postgresql+asyncpg://proxmox_mcp:postgres@localhost:5432/proxmox_mcp_test
        run: python -m pytest tests/release/test_migration_gate.py::test_alembic_upgrade_creates_schema_matching_postgresql -q

  docker-build:
    permissions:
      contents: read
      actions: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: enterprise-proxmox-mcp:ci
      - name: Scan image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: enterprise-proxmox-mcp:ci
          format: sarif
          output: trivy-image-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: "true"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: image-scan
          path: trivy-image-results.sarif

  vulnerability-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install audit tooling
        run: python -m pip install --upgrade pip pip-audit
      - name: Audit dependencies
        run: python -m pip_audit --skip-editable

  sbom:
    permissions:
      contents: read
      actions: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json

  lab-gates:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || inputs.run_lab == 'true'
    env:
      PROXMOX_MCP_LAB_ENABLED: ${{ secrets.PROXMOX_MCP_LAB_ENABLED }}
      PROXMOX_MCP_LAB_API_ENDPOINT: ${{ secrets.PROXMOX_MCP_LAB_API_ENDPOINT }}
      PROXMOX_MCP_LAB_TOKEN_ID: ${{ secrets.PROXMOX_MCP_LAB_TOKEN_ID }}
      PROXMOX_MCP_LAB_TOKEN_SECRET: ${{ secrets.PROXMOX_MCP_LAB_TOKEN_SECRET }}
      PROXMOX_MCP_LAB_USERNAME: ${{ secrets.PROXMOX_MCP_LAB_USERNAME }}
      PROXMOX_MCP_LAB_PASSWORD: ${{ secrets.PROXMOX_MCP_LAB_PASSWORD }}
      PROXMOX_MCP_LAB_TLS_VERIFY: ${{ secrets.PROXMOX_MCP_LAB_TLS_VERIFY }}
      PROXMOX_MCP_LAB_ALLOW_INSECURE_TRANSPORT: ${{ secrets.PROXMOX_MCP_LAB_ALLOW_INSECURE_TRANSPORT }}
      PROXMOX_MCP_LAB_NODE: ${{ secrets.PROXMOX_MCP_LAB_NODE }}
      PROXMOX_MCP_LAB_STORAGE: ${{ secrets.PROXMOX_MCP_LAB_STORAGE }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install package
        run: python -m pip install --upgrade pip '.[dev]'
      - name: Validate lab configuration
        run: |
          python - <<'PY'
          import os
          from proxmox_mcp.proxmox.lab import LabEnvironmentConfig

          config = LabEnvironmentConfig.from_env(os.environ)
          if not config.enabled:
              raise SystemExit(config.skip_reason or "Lab gates are enabled but lab config is invalid")
          PY
      - name: Read-only Proxmox lab smoke tests
        run: python -m pytest tests/lab -m lab
      - name: SSH sandbox tests
        run: python -m pytest tests/ssh
      - name: Contract and mutation safety tests
        run: python -m pytest tests/tools/test_tool_coverage_contract.py tests/proxmox
      - name: Chaos gates
        run: python -m pytest tests/chaos -q
      - name: Lightweight performance gates
        run: python -m pytest tests/performance -q

  release-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install package
        run: python -m pip install --upgrade pip '.[dev]'
      - name: Run non-lab chaos and load gates
        run: python -m pytest tests/chaos tests/performance -q
      - name: Emit hardening summary
        if: success()
        run: python scripts/emit_ci_summary.py --output release-evidence/hardening-summary.json --workflow hardening --status success

  compose-smoke:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.run_compose_smoke == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Prepare homelab env
        run: |
          cp .env.example .env
          cp secrets.local.json.example secrets.local.json
          openssl req -x509 -newkey rsa:2048 -sha256 -days 1 -nodes \
            -keyout certs/local/tls.key -out certs/local/tls.crt \
            -subj "/CN=localhost"
          mkdir -p certs/local/postgres certs/local/redis
          cp certs/local/tls.crt certs/local/postgres/tls.crt
          cp certs/local/tls.key certs/local/postgres/tls.key
          cp certs/local/tls.crt certs/local/redis/tls.crt
          cp certs/local/tls.key certs/local/redis/tls.key
          cp certs/local/tls.crt certs/local/redis/ca.crt
          {
            echo "PROXMOX_MCP_SERVICE_TOKEN=ci-smoke-token"
            echo "PROXMOX_MCP_POSTGRES_PASSWORD=postgres"
            echo "PROXMOX_MCP_DATABASE_URL=postgresql+asyncpg://proxmox_mcp:postgres@postgres:5432/proxmox_mcp?ssl=require"
            echo "PROXMOX_MCP_CLUSTER__API_ENDPOINT=https://127.0.0.1:8006"
          } >> .env
      - name: Compose smoke test
        run: |
          docker compose -f docker-compose.yml -f docker-compose.homelab.yml config
          python scripts/emit_ci_summary.py --output release-evidence/compose-smoke.json --workflow hardening --status success --detail mode=config-only
      - uses: actions/upload-artifact@v4
        with:
          name: compose-smoke
          path: release-evidence/compose-smoke.json
