services:
  proxmox-mcp:
    build: .
    image: enterprise-proxmox-mcp:local
    environment:
      PROXMOX_MCP_ENVIRONMENT: production
      PROXMOX_MCP_SERVER_HOST: 0.0.0.0
      PROXMOX_MCP_SERVER_PORT: 8443
      PROXMOX_MCP_TLS__CERT_FILE: /run/proxmox-mcp/tls/tls.crt
      PROXMOX_MCP_TLS__KEY_FILE: /run/proxmox-mcp/tls/tls.key
      PROXMOX_MCP_TLS__GENERATE_SELF_SIGNED: "false"
      PROXMOX_MCP_DATABASE_URL: postgresql+asyncpg://proxmox_mcp:proxmox_mcp@postgres/proxmox_mcp?ssl=require
      PROXMOX_MCP_REDIS_URL: rediss://redis:6379/0
      PROXMOX_MCP_CREDENTIAL_PROVIDER: hashicorp_vault
    ports:
      - "8443:8443"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - ./certs/local:/run/proxmox-mcp/tls:ro
    security_opt:
      - no-new-privileges:true

  postgres:
    image: postgres:16-alpine
    command:
      - postgres
      - -c
      - ssl=on
      - -c
      - ssl_cert_file=/run/postgresql/tls/tls.crt
      - -c
      - ssl_key_file=/run/postgresql/tls/tls.key
    environment:
      POSTGRES_USER: proxmox_mcp
      POSTGRES_PASSWORD: proxmox_mcp
      POSTGRES_DB: proxmox_mcp
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proxmox_mcp"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./certs/local/postgres:/run/postgresql/tls:ro

  redis:
    image: redis:7-alpine
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --port
      - "0"
      - --tls-port
      - "6379"
      - --tls-cert-file
      - /run/redis/tls/tls.crt
      - --tls-key-file
      - /run/redis/tls/tls.key
      - --tls-ca-cert-file
      - /run/redis/tls/ca.crt
      - --tls-auth-clients
      - "no"
    healthcheck:
      test: ["CMD", "redis-cli", "--tls", "--cacert", "/run/redis/tls/ca.crt", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis-data:/data
      - ./certs/local/redis:/run/redis/tls:ro

volumes:
  postgres-data:
  redis-data:
