services:
  proxmox-mcp:
    build: .
    image: enterprise-proxmox-mcp:local
    environment:
      PROXMOX_MCP_ENVIRONMENT: production
      PROXMOX_MCP_SERVER_HOST: 0.0.0.0
      PROXMOX_MCP_SERVER_PORT: 8080
      PROXMOX_MCP_DATABASE_URL: postgresql+asyncpg://proxmox_mcp:proxmox_mcp@postgres/proxmox_mcp
      PROXMOX_MCP_REDIS_URL: redis://redis:6379/0
      PROXMOX_MCP_CREDENTIAL_PROVIDER: hashicorp_vault
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: proxmox_mcp
      POSTGRES_PASSWORD: proxmox_mcp
      POSTGRES_DB: proxmox_mcp
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proxmox_mcp"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
